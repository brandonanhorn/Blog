<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Contact</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page">
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/archive/">Archive</a>
      <a href="/contact/">Contact</a>
    </nav>

    <h1>Contact</h1>
    <p>Send a message:</p>

    <form method="POST" action="REPLACE_WITH_BACKEND_ENDPOINT">
      <input type="text" name="name" placeholder="Name" required><br><br>
      <input type="email" name="email" placeholder="Email" required><br><br>
      <textarea name="message" placeholder="Message" required></textarea><br><br>

      <!-- honeypot spam field -->
      <input type="text" name="company" style="display:none">

      <button type="submit">Send</button>
    </form>

    <p>
      Note: This form must connect to a secure backend.\n
      Do NOT store any email credentials in this repository.\n
      Messages should be forwarded to: ai.brandonanhorn@gmail.com
    </p>
  </main>
</body>
</html>

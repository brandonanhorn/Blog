<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact</title>
  <link rel="stylesheet" href="../styles.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <header>
    <nav>
      <a href="../index.html">Home</a>
      <a href="../archive/index.html">Archive</a>
      <a href="./index.html" aria-current="page">Contact</a>
      <a href="../knowledge/index.html">Knowledge</a>
    </nav>
  </header>
  <main>
    <h1>Contact</h1>
    <p>If you’re building something interesting, hiring, or want to connect — send a note below.
Messages are routed through a lightweight AI agent that helps organize and prioritize conversations before they reach me.</p>
    <form method="post" action="https://contact-form-worker.brandonanhorn.workers.dev" data-contact-form novalidate>
      <label for="name">Name</label>
      <input id="name" name="name" type="text" autocomplete="name" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <div style="position:absolute;left:-9999px;opacity:0;pointer-events:none;" aria-hidden="true">
        <label for="company">Company</label>
        <input id="company" name="company" type="text" tabindex="-1" autocomplete="off">
      </div>

      <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_15LsEkbKEGxEE"></div>

      <button type="submit">Send</button>
      <p data-form-status role="status" aria-live="polite"></p>
    </form>
  </main>
  <script src="./contact.js"></script>
</body>
</html>

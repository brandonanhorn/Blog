<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge Interface</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header>
    <nav>
      <a href="../index.html">Home</a>
      <a href="../archive/index.html">Archive</a>
      <a href="../contact/index.html">Contact</a>
      <a href="./index.html" aria-current="page">Knowledge</a>
    </nav>
  </header>
  <main>
    <section class="knowledge-shell" aria-labelledby="knowledge-heading">
      <h1 id="knowledge-heading">Knowledge Interface</h1>
      <p>Ask a question about my public notes, projects, writing, or ideas.</p>
      <p class="knowledge-note">This system is experimental and may not always be online.</p>

      <form class="knowledge-form" data-knowledge-form novalidate>
        <label for="knowledge-message">Question</label>
        <textarea
          id="knowledge-message"
          name="message"
          rows="6"
          maxlength="4000"
          placeholder="Ask something..."
          required
        ></textarea>
        <button type="submit" data-ask-button>Ask</button>
      </form>

      <section class="knowledge-response" aria-live="polite" aria-atomic="true">
        <h2>Response</h2>
        <pre data-knowledge-response>Ask a question to begin.</pre>
      </section>
    </section>
  </main>
  <script src="./knowledge.js"></script>
</body>
</html>
